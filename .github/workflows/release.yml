name: Release Module

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and package module
        run: ./scripts/package.sh docker

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/branchage-module.tar.gz

      - name: Update release.json on main
        env:
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}/branchage-module.tar.gz"

          git fetch origin main
          git switch main || git switch --create main --track origin/main
          git pull --ff-only origin main

          cat > release.json <<EOF
          {
              "id": "branchage",
              "name": "Branchage",
              "description": "Grids drum maps with per-lane Branches-style note branching",
              "component_type": "midi_fx",
              "latest_version": "${VERSION}",
              "download_url": "${DOWNLOAD_URL}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release.json

          if git diff --cached --quiet; then
            echo "release.json is already up to date"
            exit 0
          fi

          git commit -m "chore: update release.json for ${TAG_NAME}"
          git push origin main
